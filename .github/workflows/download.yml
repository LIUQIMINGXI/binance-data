name: Download Binance Data (Spot + Futures)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    env:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Download and Upload
        run: |
          set -e
          PAIRS="ETHUSDT BTCUSDT"
          START_Y=2020; START_M=1
          NOW_Y=$(date +%Y); NOW_M=$(date +%-m); NOW_D=$(date +%-d)
          if [ $NOW_M -eq 1 ]; then END_Y=$((NOW_Y-1)); END_M=12
          else END_Y=$NOW_Y; END_M=$((NOW_M-1)); fi

          TOTAL_INDICATORS=0  # computed below
          DONE=0
          log_progress() { echo "::group::[${1}%] ${2}"; echo "::endgroup::"; }
          ndays() { cal $2 $1 2>/dev/null | awk 'NF {d=$NF} END {print d+0}'; }

          # Create release
          TAG="data-$(date +%Y%m%d-%H%M%S)"
          echo "Creating release: $TAG"
          RESP=$(curl -sL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/$REPO/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"Binance Spot+Futures BTC+ETH\",\"body\":\"Auto download\"}")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "ERROR creating release:"; echo "$RESP"; exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          upload() {
            if curl -sL -X POST \
              -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=${2}" \
              --data-binary "@${1}" > /dev/null 2>&1; then
              rm -f "${1}"; echo "      uploaded"
            else echo "      upload FAILED, keeping ${1}"; fi
          }
          cksum_dl() { curl -sS --retry 1 -o "${1}.CHECKSUM" "${2}.CHECKSUM" 2>/dev/null || true; }

          upload_pending() {
            if ls staging/*.zip staging/*.CHECKSUM >/dev/null 2>&1; then
              local COUNT=$(ls staging/*.zip staging/*.CHECKSUM 2>/dev/null | wc -l)
              echo "  [BATCH UPLOAD] ${COUNT} files..."
              for F in staging/*.zip staging/*.CHECKSUM; do
                [ -f "$F" ] || continue
                upload "$F" "${SECTION}/${PAIR}/${INDNAME}/$(basename $F)"
              done
            fi
          }

          mkdir -p staging

          # ----- download helpers -----
          # monthly_url: BASE INDNAME PAIR SUB FNAME
          monthly_url() {
            if [ -n "$4" ]; then echo "${1}/monthly/${2}/${3}/${4}/${5}"
            else echo "${1}/monthly/${2}/${3}/${5}"; fi
          }
          # daily_url: BASE INDNAME PAIR SUB FNAME
          daily_url() {
            if [ -n "$4" ]; then echo "${1}/daily/${2}/${3}/${4}/${5}"
            else echo "${1}/daily/${2}/${3}/${5}"; fi
          }

          download_section() {
            local BASE=$1 SECTION=$2; shift 2
            local IND_M=("${!1}"); shift; local IND_D=("${!1}"); shift

            for PAIR in $PAIRS; do

              # ----- monthly indicators -----
              for entry in "${IND_M[@]}"; do
                INDNAME="${entry%%:*}"; SUB="${entry#*:}"
                echo "== [${SECTION}] ${PAIR}/${INDNAME} =="
                local ZIPFY="${SUB:-${INDNAME}}"  # suffix for zip name
                local IS_BIG=0; [ "$INDNAME" = "aggTrades" ] && IS_BIG=1 || true

                Y=$START_Y; M=$START_M
                while [ $Y -lt $END_Y ] || ([ $Y -eq $END_Y ] && [ $M -le $END_M ]); do
                  MM=$(printf '%02d' $M)
                  local PCT=$((DONE * 100 / TOTAL_INDICATORS))
                  log_progress "$PCT" "[${SECTION}/${PAIR}/${INDNAME}] ${Y}-${MM}"

                  ZN="${PAIR}-${ZIPFY}-${Y}-${MM}.zip"
                  MURL=$(monthly_url "$BASE" "$INDNAME" "$PAIR" "$SUB" "$ZN")
                  echo -n "  [M] ${Y}-${MM} ... "

                  if curl -fSL --retry 3 --retry-delay 10 -o "staging/${ZN}" "$MURL" 2>/dev/null; then
                    echo "$(du -h staging/${ZN} | cut -f1)"
                    cksum_dl "staging/${ZN}" "$MURL"
                    local GOT=$(unzip -l "staging/${ZN}" 2>/dev/null | grep -cE '\.(csv|json)$' || echo 0)
                    local NEED=$(ndays $Y $M)
                    echo "    zip:${GOT} files, calendar:${NEED} days"

                    if [ ${GOT:-0} -lt $NEED ]; then
                      echo "    -> Backfilling missing days..."
                      local ZIP_DAYS=$(unzip -l "staging/${ZN}" 2>/dev/null | grep -oE "${Y}-${MM}-[0-9]{2}" | sed "s/${Y}-${MM}-//" | sort -u)
                      for d in $(seq -w 1 $NEED); do
                        if echo "$ZIP_DAYS" | grep -qw "$d"; then continue; fi
                        DZN="${PAIR}-${ZIPFY}-${Y}-${MM}-${d}.zip"
                        DURL=$(daily_url "$BASE" "$INDNAME" "$PAIR" "$SUB" "$DZN")
                        echo -n "      [D] day ${d} ... "
                        if curl -fSL --retry 2 --retry-delay 5 --max-time 120 -o "staging/${DZN}" "$DURL" 2>/dev/null; then
                          echo "OK"; cksum_dl "staging/${DZN}" "$DURL"
                        else echo "N/A"; fi
                      done
                    fi
                  else
                    echo "N/A, falling back to daily..."
                    local NEED=$(ndays $Y $M)
                    for d in $(seq -w 1 $NEED); do
                      DZN="${PAIR}-${ZIPFY}-${Y}-${MM}-${d}.zip"
                      DURL=$(daily_url "$BASE" "$INDNAME" "$PAIR" "$SUB" "$DZN")
                      if [ -f "staging/${DZN}" ]; then echo -n "    [D] day ${d} ... SKIP"; echo ""; continue; fi
                      echo -n "    [D] day ${d} ... "
                      if curl -fSL --retry 2 --retry-delay 5 --max-time 120 -o "staging/${DZN}" "$DURL" 2>/dev/null; then
                        echo "OK"; cksum_dl "staging/${DZN}" "$DURL"
                      else echo "N/A"; break; fi
                    done
                  fi

                  # Batch upload: aggTrades every 6 months, others every year
                  if { [ $IS_BIG -eq 1 ] && ([ $M -eq 6 ] || [ $M -eq 12 ]); } || { [ $IS_BIG -eq 0 ] && [ $M -eq 12 ]; }; then
                    local LABEL="year ${Y}"
                    [ $IS_BIG -eq 1 ] && LABEL="${Y}-H$(( (M+5)/6 ))"
                    echo "  [BATCH UPLOAD] ${LABEL}..."
                    upload_pending
                  fi
                  M=$((M+1)); if [ $M -gt 12 ]; then M=1; Y=$((Y+1)); fi
                done

                # Current incomplete month
                if [ $((NOW_D-1)) -ge 1 ]; then
                  MM=$(printf '%02d' $NOW_M)
                  echo "  [CURRENT] ${NOW_Y}-${MM} (days 1-$((NOW_D-1)))"
                  for d in $(seq -w 1 $((NOW_D-1))); do
                    DZN="${PAIR}-${ZIPFY}-${NOW_Y}-${MM}-${d}.zip"
                    DURL=$(daily_url "$BASE" "$INDNAME" "$PAIR" "$SUB" "$DZN")
                    echo -n "    day ${d} ... "
                    if curl -fSL --retry 2 --retry-delay 5 --max-time 120 -o "staging/${DZN}" "$DURL" 2>/dev/null; then
                      echo "OK"; cksum_dl "staging/${DZN}" "$DURL"
                    else echo "N/A"; fi
                  done
                fi

                echo "  [BATCH UPLOAD] final..."
                upload_pending
                DONE=$((DONE + 1))
              done

              # ----- daily-only indicators -----
              for entry in "${IND_D[@]}"; do
                INDNAME="${entry%%:*}"; SUB="${entry#*:}"
                echo "== [${SECTION}] ${PAIR}/${INDNAME} (daily only) =="
                local ZIPFY="${SUB:-${INDNAME}}"

                Y=$START_Y; M=$START_M
                while [ $Y -lt $NOW_Y ] || ([ $Y -le $NOW_Y ] && [ $M -le $NOW_M ]); do
                  MM=$(printf '%02d' $M)
                  local NEED=$(ndays $Y $M)
                  if [ $Y -eq $NOW_Y ] && [ $M -eq $NOW_M ]; then NEED=$((NOW_D-1)); fi
                  if [ -z "$NEED" ] || [ "$NEED" -lt 1 ]; then M=$((M+1)); continue; fi

                  local PCT=$((DONE * 100 / TOTAL_INDICATORS))
                  log_progress "$PCT" "[${SECTION}/${PAIR}/${INDNAME}] ${Y}-${MM}"
                  echo "  [D] ${Y}-${MM} (${NEED} days)"
                  local GOT=0
                  for d in $(seq -w 1 $NEED); do
                    DZN="${PAIR}-${ZIPFY}-${Y}-${MM}-${d}.zip"
                    DURL=$(daily_url "$BASE" "$INDNAME" "$PAIR" "$SUB" "$DZN")
                    echo -n "    ${d} ... "
                    if curl -fSL --retry 2 --retry-delay 5 --max-time 120 -o "staging/${DZN}" "$DURL" 2>/dev/null; then
                      echo "OK"; cksum_dl "staging/${DZN}" "$DURL"; GOT=$((GOT+1))
                    else
                      echo "N/A"
                      if [ $GOT -eq 0 ] && [ $d -gt 3 ]; then break; fi
                    fi
                  done
                  if [ $M -eq 12 ]; then
                    echo "  [BATCH UPLOAD] year ${Y}..."
                    upload_pending
                  fi
                  M=$((M+1)); if [ $M -gt 12 ]; then M=1; Y=$((Y+1)); fi
                done
                echo "  [BATCH UPLOAD] final..."
                upload_pending
                DONE=$((DONE + 1))
              done

            done
          }

          # ----- Indicator definitions: "name:subfolder" -----
          # subfolder = ""  means no subfolder in URL, zip uses indicator name
          # subfolder = "1m" means URL has /1m/, zip uses "1m" as suffix
          FUT_M=("klines:1m" "aggTrades:" "fundingRate:"
                 "markPriceKlines:1m" "indexPriceKlines:1m" "premiumIndexKlines:1m")
          FUT_D=("bookDepth:" "metrics:")
          SPOT_M=("klines:1m" "aggTrades:")
          SPOT_D=()

          TOTAL_INDICATORS=$(( (${#FUT_M[@]} + ${#FUT_D[@]} + ${#SPOT_M[@]} + ${#SPOT_D[@]}) * 2 ))
          echo "Total indicator pairs: $TOTAL_INDICATORS"

          download_section "https://data.binance.vision/data/futures/um" "futures" FUT_M[@] FUT_D[@]
          download_section "https://data.binance.vision/data/spot" "spot" SPOT_M[@] SPOT_D[@]

          echo "ALL DONE! Release: https://github.com/$REPO/releases/tag/$TAG"
